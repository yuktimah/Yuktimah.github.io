<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle 4 | Puzzle Quest</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>⌨️ Puzzle 4</h1>

        <p class="subtitle">
            Final Challenge! Solve the riddle below.
        </p>

        <div class="question">

            <p>
                I have <strong>keys</strong> but no locks.<br><br>

                I have <strong>space</strong> but no rooms.<br><br>

                You can <strong>enter</strong>, but you can't go outside.<br><br>

                <strong>What am I?</strong>
            </p>

        </div>

        <input
            type="text"
            id="answer"
            placeholder="Type your answer here..."
            autocomplete="off"
        >

        <button onclick="checkAnswer('keyboard','score.html')">
            Submit Answer
        </button>

        <p id="message"></p>

        <footer>
            🎯 Final Puzzle (4 of 4)
        </footer>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
