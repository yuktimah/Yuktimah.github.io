<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle 1 | Puzzle Quest</title>

</head>
<body>

<div class="container">

    <div class="card">

        <h1>🧩 Puzzle 1</h1>

        <p class="subtitle">
            Solve the riddle below.
        </p>

        <div class="question">
            <p>
                I speak without a mouth and hear without ears.<br><br>

                I have no body, but I come alive with the wind.<br><br>

                <strong>What am I?</strong>
            </p>
        </div>

        <input
            type="text"
            id="answer"
            placeholder="Type your answer here..."
            autocomplete="off"
        >

        <button onclick="checkAnswer('echo','puzzle2.html')">
            Submit Answer
        </button>

        <p id="message"></p>

        <footer>
            Puzzle 1 of 4
        </footer>

    </div>

</div>

<script src="script.js"></script>

</body>
